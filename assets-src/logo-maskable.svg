<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5BFF"/>
      <stop offset="1" stop-color="#0A2ACC"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1848F5"/>
      <stop offset="1" stop-color="#0A2ACC"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (maskable safe zone = center 80%) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" fill="#FFFFFF" opacity="0.05"/>

  <!-- bell scaled to sit inside the safe zone -->
  <g transform="translate(256 248) scale(0.78) translate(-256 -248)">
    <path fill="#FFFFFF" d="M256 116
      c-16 0 -29 13 -29 29 v10
      c-52 13 -86 58 -86 113 v55
      l-30 46 c-9 14 1 33 18 33 h254
      c17 0 27 -19 18 -33 l-30 -46 v-55
      c0 -55 -34 -100 -86 -113 v-10
      c0 -16 -13 -29 -29 -29 z"/>
    <path fill="#FFFFFF" d="M222 418 a34 34 0 0 0 68 0 z"/>
    <circle cx="372" cy="360" r="62" fill="#FFFFFF"/>
    <path d="M344 360 l18 19 l37 -41" fill="none" stroke="url(#check)" stroke-width="20"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
